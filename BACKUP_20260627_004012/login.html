<!DOCTYPE html>
<html>
<head>
    <title>Login - Whitestone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0A1628;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            max-width: 100%;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .box h1 {
            color: #0A1628;
            margin: 0 0 5px 0;
            font-size: 28px;
            letter-spacing: 3px;
        }
        .box .sub {
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .status.loading {
            background: #fef9e7;
            color: #f1c40f;
            border: 1px solid #f9e79f;
        }
        .status.success {
            background: #e8f8ed;
            color: #2ecc71;
            border: 1px solid #a9dfbf;
        }
        .status.error {
            background: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f5baba;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            color: #4A4A4A;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            background: #f5f2ed;
        }
        input:focus {
            outline: none;
            border-color: #0A1628;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0A1628;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover:not(:disabled) {
            background: #1A2A4A;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 13px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .server-info {
            margin-top: 12px;
            font-size: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>WHITESTONE</h1>
        <p class="sub">Poultry Management System</p>
        
        <div id="status" class="status loading">Detecting server...</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="Admin123!">
            </div>
            <button type="submit" id="loginBtn" disabled>Checking server...</button>
        </form>
        
        <div id="error" class="error"></div>
        <div id="serverInfo" class="server-info"></div>
    </div>

    <script>
        // ============================================
        // SIMPLE WORKING LOGIN
        // ============================================
        var API_URL = 'http://localhost:5500';
        var serverReady = false;
        
        var statusEl = document.getElementById('status');
        var errorEl = document.getElementById('error');
        var serverInfoEl = document.getElementById('serverInfo');
        var loginBtn = document.getElementById('loginBtn');
        var loginForm = document.getElementById('loginForm');

        // Check if server is running
        function checkServer() {
            fetch(API_URL + '/api/health', {
                method: 'GET',
                signal: AbortSignal.timeout(3000)
            })
            .then(function(response) {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error('Server error');
                }
            })
            .then(function(data) {
                statusEl.textContent = 'Server connected';
                statusEl.className = 'status success';
                serverInfoEl.innerHTML = 'API: <strong>' + API_URL + '</strong>';
                serverReady = true;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                console.log('Server connected');
            })
            .catch(function(error) {
                statusEl.textContent = 'Server not running. Start with: cd backend; npm start';
                statusEl.className = 'status error';
                serverInfoEl.innerHTML = 'Run: <strong>cd backend; npm start</strong>';
                loginBtn.disabled = true;
                loginBtn.textContent = 'Server Offline';
                console.log('Server not found');
            });
        }

        // Handle login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!serverReady) {
                errorEl.textContent = 'Server not connected. Please wait.';
                errorEl.className = 'error show';
                return;
            }
            
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            errorEl.className = 'error';
            
            fetch(API_URL + '/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(function(response) {
                return response.json().then(function(data) {
                    if (response.ok && data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = 'dashboard.html';
                    } else {
                        throw new Error(data.error || 'Login failed');
                    }
                });
            })
            .catch(function(error) {
                errorEl.textContent = error.message || 'Network error. Please try again.';
                errorEl.className = 'error show';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            });
        });

        // Check if already logged in
        function checkSession() {
            var token = localStorage.getItem('token');
            if (!token) {
                return;
            }
            
            fetch(API_URL + '/api/auth/me', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(function(response) {
                if (response.ok) {
                    window.location.href = 'dashboard.html';
                } else {
                    localStorage.removeItem('token');
                }
            })
            .catch(function() {
                localStorage.removeItem('token');
            });
        }

        // Start
        checkServer();
        checkSession();

        // Re-check server every 5 seconds if not connected
        if (!serverReady) {
            setInterval(checkServer, 5000);
        }
    </script>
</body>
</html>
