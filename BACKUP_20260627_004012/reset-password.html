<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Whitestone Dynamic</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <h2>WHITESTONE</h2>
                <span>DYNAMIC</span>
            </div>
            <h3>Reset Password</h3>
            <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
                Enter your username and new password
            </p>
            <form id="resetForm">
                <div class="form-group">
                    <label for="resetUsername">Username *</label>
                    <input type="text" id="resetUsername" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="resetNewPassword">New Password *</label>
                    <input type="password" id="resetNewPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="resetConfirmPassword">Confirm Password *</label>
                    <input type="password" id="resetConfirmPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            <p class="auth-link">
                <a href="login.html">← Back to Login</a>
            </p>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
