<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Whitestone Dynamic</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="rooster-overlay">
            <div class="rooster-wrapper">
                <div class="rooster">🐓</div>
                <div class="crown-animation">
                    <span class="crown">⭐</span>
                </div>
                <div class="sun-rays"></div>
            </div>
        </div>

        <div class="auth-box">
            <div class="auth-logo">
                <h2>WHITESTONE</h2>
                <span>DYNAMIC</span>
            </div>
            <h3>Login to Dashboard</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="rememberMe" style="width: auto; margin: 0;">
                    <label for="rememberMe"
                        style="margin: 0; font-size: 13px; color: var(--text-muted); cursor: pointer;">Remember
                        me</label>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <p class="auth-link">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
            <p class="auth-link" style="margin-top: 8px; font-size: 12px;">
                <a href="reset-password.html">Forgot password?</a>
            </p>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; color: var(--text-muted);">
                <strong>Demo:</strong> Use <strong>admin</strong> (no password)
            </p>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
